name: Integration CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"

permissions:
  contents: read

concurrency:
  group: integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plugin-checks:
    name: Zotero plugin checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zotero-plugin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: zotero-plugin/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm test

  plugin-xpi:
    name: macOS universal XPI
    needs: plugin-checks
    runs-on: macos-14
    defaults:
      run:
        working-directory: zotero-plugin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: zotero-plugin/package-lock.json
      - run: npm ci
      - name: Test the native helper
        run: npm run native:test
      - name: Build the universal native helper
        run: npm run native:universal
      - name: Build the installable XPI
        run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: zotero-plugin-xpi
          path: |
            zotero-plugin/dist/*.xpi
            zotero-plugin/dist/*.sha256
          if-no-files-found: error
          retention-days: 14
