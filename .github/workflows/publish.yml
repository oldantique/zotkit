name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build:
    # Only the Python package publishes to PyPI. Plugin releases are tagged
    # `plugin-vX.Y.Z` and ship an XPI via plugin-release.yml — never PyPI.
    if: ${{ !startsWith(github.event.release.tag_name, 'plugin-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC for PyPI Trusted Publishing — no token needed
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
